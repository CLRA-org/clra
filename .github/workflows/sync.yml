name: Sync from Upstream

on:
  schedule:
    - cron: '0 * * * *'             # 每小时运行一次
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write                # 需要创建 issue 的权限

    steps:
      - name: Check if running in main repository
        run: |
          if [ "${{ github.repository }}" = "CLRA-org/clra" ]; then
            echo "🛑 This is the main repository. Syncing is not needed. Exiting."
            exit 0
          fi

      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up upstream
        run: |
          git remote add upstream https://github.com/CLRA-org/clra.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream into main
        id: merge
        continue-on-error: true      # 合并失败不中断整个 job
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git checkout main
          git merge upstream/main
          git push origin main

      - name: Create issue on conflict
        if: steps.merge.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '⚠️ 从上游合并时发生冲突';
            const body = `自动同步上游仓库 \`CLRA-org/clra\` 时出现合并冲突，需手动解决。

            - 冲突日期：${new Date().toISOString().split('T')[0]}
            - 冲突分支：${context.ref}
            - 工作流运行：[查看详情](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

            请手动执行 \`git merge upstream/main\` 并解决冲突，然后推送到本仓库。`;
            
            // 避免重复创建相同标题的 issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: []
            });
            const exists = issues.some(i => i.title === title);
            if (!exists) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['sync-conflict']
              });
              console.log('✅ Issue created.');
            } else {
              console.log('⏭️ Issue already exists, skipping.');
            }